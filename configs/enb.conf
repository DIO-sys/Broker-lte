#####################################################################
#                   srsENB configuration file
#####################################################################

#####################################################################
# eNB configuration
#
# enb_id:         20-bit eNB identifier
# mcc:            Mobile Country Code
# mnc:            Mobile Network Code
# mme_addr:       IP address of MME for S1 connection
# gtp_bind_addr:  Local IP address to bind for GTP connection
# s1c_bind_addr:  Local IP address to bind for S1AP connection
# n_prb:          Number of Physical Resource Blocks (6,15,25,50,75,100)
#
#####################################################################
[enb]
enb_id = 0x19B
mcc = 901
mnc = 70
mme_addr = 127.0.1.100
gtp_bind_addr = 127.0.1.1
s1c_bind_addr = 127.0.1.1
n_prb = 25

#####################################################################
# RF configuration
#
# dl_earfcn:  Downlink EARFCN (2850 = Band 7, 2630 MHz DL)
# tx_gain:    Transmit gain
# rx_gain:    Receive gain
#
# ZMQ device args:
#   tx_port0: eNB transmits DL on this port (broker pulls from here)
#   rx_port0: eNB receives UL on this port (broker pushes here)
#   base_srate: must be 11.52e6 for 50 PRB
#   fail_on_disconnect: restart if ZMQ peer disappears
#
# 3000-series ports — broker topology
#####################################################################
[rf]
dl_earfcn = 2850
tx_gain = 80
rx_gain = 40
device_name = zmq
device_args = fail_on_disconnect=false,tx_port=tcp://*:3101,rx_port=tcp://localhost:3100,id=enb,base_srate=11.52e6

#####################################################################
# PCAP configuration
#####################################################################
[pcap]
enable = false
filename = /tmp/enb_mac.pcap
#####################################################################
# Log configuration
#####################################################################
[log]
all_level = warning
all_hex_limit = 32
filename = /tmp/enb.log

#####################################################################
# Expert configuration
#####################################################################
[expert]
#pusch_max_its = 8
#nof_phy_threads = 3
#metrics_period_secs = 1
#pregenerate_signals = false
#tx_amplitude = 0.6
#rrc_inactivity_timer = 60000

[enb_files]
rr_config = /home/timodagoat/code/Broker-lte/configs/rr.conf
[rf]
freq_offset = 0
tx_gain = 80
device_name = zmq
device_args = tx_port=tcp://*:3001,rx_port=tcp://localhost:3000,id=ue1,base_srate=11.52e6
[rat.eutra]
dl_earfcn = 2850

[usim]
mode = soft
algo = milenage
opc  = 63bfa50ee6523365ff14c1f45f88737d
k    = 00112233445566778899aabbccddeeff
imsi = 901700123456789
imei = 353490069873319

[nas]
apn = srsapn

[gw]
netns = ue1

[gui]
enable = false

[log]
all_level = warning
all_hex_limit = 32
filename = /tmp/ue1.log

[general]
metrics_csv_enable = true
metrics_period_secs = 1
metrics_csv_filename = /tmp/ue1_metrics.csv
metrics_csv_flush_period_sec = 1